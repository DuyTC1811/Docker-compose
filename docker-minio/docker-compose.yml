services:
  minio:
    image: minio/minio:latest
    container_name: minio
    command: server /data --console-address ":9001"
    ports:
      - "9000:9000"   # S3 API
      - "9001:9001"   # Web Console
    environment:
      MINIO_ROOT_USER: duytc
      MINIO_ROOT_PASSWORD: anhduy12
    volumes:
      - minio_data:/data

volumes:
  minio_data:

