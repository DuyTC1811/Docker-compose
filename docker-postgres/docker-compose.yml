services:
  postgres:
    image: docker.io/postgres:latest
    container_name: postgres
    restart: always
    environment:
      postgres_password: anhduy12
      postgres_user: postgres
      postgres_db: postgres
    ports:
      - '5432:5432'
    volumes:
      - postgres-data:/var/lib/postgresql/data

volumes:
  postgres-data:
