services:
  postgres:
    image: docker.io/postgres:latest
    container_name: postgres
    restart: unless-stopped
    environment:
      POSTGRES_USER: duytc
      POSTGRES_PASSWORD: anhduy12
      POSTGRES_DB: postgres
    command:
      - postgres
      - -c
      - wal_level=logical
      - -c
      - max_replication_slots=10
      - -c
      - max_wal_senders=10
    ports:
      - "5432:5432"
    volumes:
      - postgres-data:/varvar/lib/postgresql

volumes:
  postgres-data:
