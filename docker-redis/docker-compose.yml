x-redis-common: &redis-common
  image: redis:7.4-alpine
  network_mode: "host"
  restart: unless-stopped
  command: >
    redis-server
    --cluster-enabled yes
    --cluster-config-file nodes.conf
    --cluster-node-timeout 5000
    --appendonly yes
    --protected-mode no
    --bind 0.0.0.0

services:
  redis-1:
    <<: *redis-common
    container_name: redis-1
    command: >
      redis-server
      --port 7001
      --cluster-enabled yes
      --cluster-config-file nodes.conf
      --cluster-node-timeout 5000
      --appendonly yes
      --protected-mode no
      --bind 0.0.0.0
      --cluster-announce-ip 127.0.0.1
      --cluster-announce-port 7001
      --cluster-announce-bus-port 17001
    volumes:
      - redis-1:/data

  redis-2:
    <<: *redis-common
    container_name: redis-2
    command: >
      redis-server
      --port 7002
      --cluster-enabled yes
      --cluster-config-file nodes.conf
      --cluster-node-timeout 5000
      --appendonly yes
      --protected-mode no
      --bind 0.0.0.0
      --cluster-announce-ip 127.0.0.1
      --cluster-announce-port 7002
      --cluster-announce-bus-port 17002
    volumes:
      - redis-2:/data

  redis-3:
    <<: *redis-common
    container_name: redis-3
    command: >
      redis-server
      --port 7003
      --cluster-enabled yes
      --cluster-config-file nodes.conf
      --cluster-node-timeout 5000
      --appendonly yes
      --protected-mode no
      --bind 0.0.0.0
      --cluster-announce-ip 127.0.0.1
      --cluster-announce-port 7003
      --cluster-announce-bus-port 17003
    volumes:
      - redis-3:/data

  redis-4:
    <<: *redis-common
    container_name: redis-4
    command: >
      redis-server
      --port 7004
      --cluster-enabled yes
      --cluster-config-file nodes.conf
      --cluster-node-timeout 5000
      --appendonly yes
      --protected-mode no
      --bind 0.0.0.0
      --cluster-announce-ip 127.0.0.1
      --cluster-announce-port 7004
      --cluster-announce-bus-port 17004
    volumes:
      - redis-4:/data

  redis-5:
    <<: *redis-common
    container_name: redis-5
    command: >
      redis-server
      --port 7005
      --cluster-enabled yes
      --cluster-config-file nodes.conf
      --cluster-node-timeout 5000
      --appendonly yes
      --protected-mode no
      --bind 0.0.0.0
      --cluster-announce-ip 127.0.0.1
      --cluster-announce-port 7005
      --cluster-announce-bus-port 17005
    volumes:
      - redis-5:/data

  redis-6:
    <<: *redis-common
    container_name: redis-6
    command: >
      redis-server
      --port 7006
      --cluster-enabled yes
      --cluster-config-file nodes.conf
      --cluster-node-timeout 5000
      --appendonly yes
      --protected-mode no
      --bind 0.0.0.0
      --cluster-announce-ip 127.0.0.1
      --cluster-announce-port 7006
      --cluster-announce-bus-port 17006
    volumes:
      - redis-6:/data

  redis-cluster-init:
    image: redis:7.4-alpine
    container_name: redis-cluster-init
    network_mode: "host"
    depends_on:
      - redis-1
      - redis-2
      - redis-3
      - redis-4
      - redis-5
      - redis-6
    entrypoint: ["/bin/sh","-c"]
    command: >
      sleep 2 &&
      redis-cli --cluster create
      127.0.0.1:7001 127.0.0.1:7002 127.0.0.1:7003
      127.0.0.1:7004 127.0.0.1:7005 127.0.0.1:7006
      --cluster-replicas 1 --cluster-yes

  redisinsight:
    image: redis/redisinsight:latest
    container_name: redisinsight
    network_mode: "host"
    restart: unless-stopped
    volumes:
      - redisinsight:/db
    # RedisInsight sẽ mở UI ở http://localhost:5540

volumes:
  redis-1:
  redis-2:
  redis-3:
  redis-4:
  redis-5:
  redis-6:
  redisinsight:

