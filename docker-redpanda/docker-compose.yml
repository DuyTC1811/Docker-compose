networks:
  redpanda_network:
    driver: bridge

volumes:
  redpanda-0:
  redpanda-1:
  redpanda-2:

services:
  redpanda-0:
    image: docker.redpanda.com/redpandadata/redpanda:v26.1.2
    container_name: redpanda-0
    hostname: redpanda-0
    restart: unless-stopped
    command:
      - redpanda
      - start
      - --node-id
      - "0"
      - --smp
      - "2"
      - --memory
      - "4G"
      - --reserve-memory
      - "1G"
      - --default-log-level=info
      - --kafka-addr
      - internal://0.0.0.0:9092,external://0.0.0.0:19092
      - --advertise-kafka-addr
      - internal://redpanda-0:9092,external://127.0.0.1:19092
      - --pandaproxy-addr
      - internal://0.0.0.0:8082,external://0.0.0.0:18082
      - --advertise-pandaproxy-addr
      - internal://redpanda-0:8082,external://127.0.0.1:18082
      - --schema-registry-addr
      - internal://0.0.0.0:8081,external://0.0.0.0:18081
      - --rpc-addr
      - redpanda-0:33145
      - --advertise-rpc-addr
      - redpanda-0:33145
    volumes:
      - redpanda-0:/var/lib/redpanda/data
    networks:
      - redpanda_network
    ports:
      - "19092:19092"
      - "18082:18082"
      - "18081:18081"
      - "19644:9644"
    healthcheck:
      test:
        [
          "CMD-SHELL",
          "rpk cluster info --brokers=localhost:9092 >/dev/null 2>&1 || exit 1",
        ]
      interval: 20s
      timeout: 10s
      retries: 10
      start_period: 30s

  redpanda-1:
    image: docker.redpanda.com/redpandadata/redpanda:v26.1.2
    container_name: redpanda-1
    hostname: redpanda-1
    restart: unless-stopped
    command:
      - redpanda
      - start
      - --node-id
      - "1"
      - --smp
      - "2"
      - --memory
      - "4G"
      - --reserve-memory
      - "1G"
      - --default-log-level=info
      - --kafka-addr
      - internal://0.0.0.0:9092,external://0.0.0.0:29092
      - --advertise-kafka-addr
      - internal://redpanda-1:9092,external://127.0.0.1:29092
      - --pandaproxy-addr
      - internal://0.0.0.0:8082,external://0.0.0.0:28082
      - --advertise-pandaproxy-addr
      - internal://redpanda-1:8082,external://127.0.0.1:28082
      - --schema-registry-addr
      - internal://0.0.0.0:8081,external://0.0.0.0:28081
      - --rpc-addr
      - redpanda-1:33145
      - --advertise-rpc-addr
      - redpanda-1:33145
      - --seeds
      - redpanda-0:33145
    volumes:
      - redpanda-1:/var/lib/redpanda/data
    networks:
      - redpanda_network
    ports:
      - "29092:29092"
      - "28082:28082"
      - "28081:28081"
      - "29644:9644"
    depends_on:
      redpanda-0:
        condition: service_healthy
    healthcheck:
      test:
        [
          "CMD-SHELL",
          "rpk cluster info --brokers=localhost:9092 >/dev/null 2>&1 || exit 1",
        ]
      interval: 20s
      timeout: 10s
      retries: 10
      start_period: 30s

  redpanda-2:
    image: docker.redpanda.com/redpandadata/redpanda:v26.1.2
    container_name: redpanda-2
    hostname: redpanda-2
    restart: unless-stopped
    command:
      - redpanda
      - start
      - --node-id
      - "2"
      - --smp
      - "2"
      - --memory
      - "4G"
      - --reserve-memory
      - "1G"
      - --default-log-level=info
      - --kafka-addr
      - internal://0.0.0.0:9092,external://0.0.0.0:39092
      - --advertise-kafka-addr
      - internal://redpanda-2:9092,external://127.0.0.1:39092
      - --pandaproxy-addr
      - internal://0.0.0.0:8082,external://0.0.0.0:38082
      - --advertise-pandaproxy-addr
      - internal://redpanda-2:8082,external://127.0.0.1:38082
      - --schema-registry-addr
      - internal://0.0.0.0:8081,external://0.0.0.0:38081
      - --rpc-addr
      - redpanda-2:33145
      - --advertise-rpc-addr
      - redpanda-2:33145
      - --seeds
      - redpanda-0:33145
    volumes:
      - redpanda-2:/var/lib/redpanda/data
    networks:
      - redpanda_network
    ports:
      - "39092:39092"
      - "38082:38082"
      - "38081:38081"
      - "39644:9644"
    depends_on:
      redpanda-0:
        condition: service_healthy
    healthcheck:
      test:
        [
          "CMD-SHELL",
          "rpk cluster info --brokers=localhost:9092 >/dev/null 2>&1 || exit 1",
        ]
      interval: 20s
      timeout: 10s
      retries: 10
      start_period: 30s

  console:
    image: docker.redpanda.com/redpandadata/console:latest
    container_name: redpanda-console
    hostname: redpanda-console
    restart: unless-stopped
    networks:
      - redpanda_network
    entrypoint: /bin/sh
    command: -c 'echo "$$CONSOLE_CONFIG_FILE" > /tmp/config.yml; /app/console'
    environment:
      CONFIG_FILEPATH: /tmp/config.yml
      CONSOLE_CONFIG_FILE: |
        kafka:
          brokers:
            - redpanda-0:9092
            - redpanda-1:9092
            - redpanda-2:9092
        schemaRegistry:
          enabled: true
          urls:
            - http://redpanda-0:8081
            - http://redpanda-1:8081
            - http://redpanda-2:8081
        redpanda:
          adminApi:
            enabled: true
            urls:
              - http://redpanda-0:9644
              - http://redpanda-1:9644
              - http://redpanda-2:9644
    ports:
      - "8080:8080"
    depends_on:
      redpanda-0:
        condition: service_healthy
      redpanda-1:
        condition: service_healthy
      redpanda-2:
        condition: service_healthy
